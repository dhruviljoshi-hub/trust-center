* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-text);

}
h1, h2, h3, h4, .nav-logo, .hero-eyebrow, .nav-btn-primary, .contact-btn {

}

/* ── NAV ──────────────────────────────────────────────────── */
.nav {

  background: rgba(255,255,255,0.55);

  border-radius: 36px;
  box-shadow: 0px 10px 15px 0px rgba(0,0,0,0.05);
  display: flex; align-items: center;
  padding: 0 20px 0 24px; gap: 16px;
}
.nav-logo {
  font-size: 14px; font-weight: 500; color: var(--fg);
  text-decoration: none; letter-spacing: -0.01em;
  flex-shrink: 0; display: flex; align-items: center; gap: 9px;
}
.nav-logo-mark {
  width: 22px; height: 22px; background: var(--color-off-black); border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
}
.nav-links { display: flex; gap: 0; list-style: none; flex: 1; justify-content: center; }
.nav-links a {
  font-size: 13px; color: var(--fg); text-decoration: none;
  padding: 5px 12px; border-radius: 20px;
  transition: color 0.15s, background 0.15s;
}
.nav-links a:hover { color: var(--color-applied-blue); }
.nav-end { margin-left: auto; flex-shrink: 0; }
.nav-btn-primary {
  font-size: 13.5px; font-weight: 400; color: #fff;
  background: var(--color-off-black); padding: 10px 20px;
  border-radius: 100px; text-decoration: none;
  transition: background 0.15s;
  font-family: var(--font-display);
}
.nav-btn-primary:hover { background: var(--color-applied-blue); }

/* ── LAYOUT ───────────────────────────────────────────────── */
main { padding-top: 96px; }
.page-hero { max-width: 860px; margin: 0 auto; padding: 0 40px; }
.page-body {
  max-width: 1120px; margin: 0 auto; padding: 0 40px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 0 56px;
  align-items: start;
}
.divider { height: 1px; background: var(--border); }

/* ── HERO ─────────────────────────────────────────────────── */
.hero { padding: 48px 0 44px; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 11px; font-weight: 500; color: var(--accent);
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 24px;
}
.hero-eyebrow-bar { display: block; width: 18px; height: 1.5px; background: var(--accent); border-radius: 2px; }
.hero h1 { font-size: 42px; font-weight: 500; line-height: 1.14; letter-spacing: -0.025em; margin-bottom: 20px; }
.hero p { font-size: 16px; line-height: 1.72; color: var(--fg-2); max-width: 620px; }
.hero-meta { margin-top: 28px; display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--fg-3); }

/* ── TOC SIDEBAR ──────────────────────────────────────────── */
.toc-sidebar {
  position: sticky; top: 96px;
  padding: 40px 20px 40px 0;
  align-self: start;
  border-right: 1px solid var(--border);
  /* Constrain so it never taller than viewport */
  max-height: calc(100vh - 112px);
  overflow-y: auto;
  /* Hide scrollbar visually */
  scrollbar-width: none;
}
.toc-sidebar::-webkit-scrollbar { display: none; }
.toc-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--fg-3); margin-bottom: 12px; padding-left: 10px;
}
.toc-list { list-style: none; }
.toc-item { position: relative; }
.toc-link {
  display: flex; flex-direction: column; gap: 1px;
  padding: 7px 10px; border-radius: 6px;
  text-decoration: none; transition: background 0.15s;
  position: relative;
}
.toc-link::before {
  content: '';
  position: absolute; right: -21px; top: 50%; transform: translateY(-50%);
  width: 2px; height: 0; border-radius: 2px;
  background: var(--accent);
  transition: height 0.22s ease;
}
.toc-link:hover { background: rgba(0,0,0,0.035); }
.toc-link:hover .toc-link-label { color: var(--fg); }
.toc-link-num {
  font-size: 9.5px; font-weight: 500; color: var(--fg-3);
  letter-spacing: 0.04em; margin-bottom: 1px;
  transition: color 0.15s;
}
.toc-link-label {
  font-size: 12.5px; font-weight: 500; color: var(--fg-2);
  transition: color 0.15s; line-height: 1.3;
}
.toc-link-sub {
  font-size: 10.5px; color: var(--fg-3); line-height: 1.3;
  transition: color 0.15s;
}
/* Active state — indicator sits on the right border line */
.toc-item.active .toc-link::before { height: 24px; }
.toc-item.active .toc-link-num   { color: var(--accent); }
.toc-item.active .toc-link-label { color: var(--accent); font-weight: 600; }
.toc-item.active .toc-link-sub   { color: var(--fg-2); }

/* ── SECTIONS ─────────────────────────────────────────────── */
.sections-container { min-width: 0; }
.content-section {
  padding: 40px 0 48px;
  scroll-margin-top: 96px;
}
.content-section + .content-section {
  border-top: 1px solid var(--border);
}
.section-header { margin-bottom: 28px; }
.section-num {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px; display: block;
}
.section-title {
  font-size: 24px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 10px; line-height: 1.2;
}
.section-tagline {
  font-size: 14.5px; color: var(--fg-2); line-height: 1.6; font-weight: 400; margin-bottom: 14px;
}
.section-body {
  font-size: 13.5px; color: var(--fg-2); line-height: 1.75; max-width: 600px;
}

/* ── BADGES (inline in section) ───────────────────────────── */
.section-badges { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 28px; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 96px; }
.badge-frame {
  width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
  transition: border-color 0.2s, transform 0.2s;
}
.badge-item:hover .badge-frame { border-color: var(--border-hover); transform: translateY(-2px); }
.badge-frame svg { display: block; width: 100%; height: 100%; }
.badge-frame img { display: block; width: 100%; height: 100%; object-fit: contain; padding: 8px; }
.badge-label { font-size: 11px; font-weight: 500; color: var(--fg); text-align: center; line-height: 1.3; }
.badge-sub { font-size: 10px; color: var(--fg-3); text-align: center; line-height: 1.35; margin-top: -2px; }

/* ── CERT CARDS ───────────────────────────────────────────── */
.cert-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 40px;
}
/* Center last row when only 2 cards remain */
.cert-grid > :nth-child(3n+1):last-child,
.cert-grid > :nth-child(3n+2):last-child {
  grid-column: 1;
}
.cert-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 20px 20px;
  display: flex; flex-direction: column;
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  text-decoration: none; color: inherit;
}
.cert-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.07);
  transform: translateY(-2px);
  border-color: var(--border-hover);
}
.cert-mark {
  height: 80px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.cert-mark img { max-height: 80px; max-width: 100%; object-fit: contain; }
.cert-mark svg { max-height: 80px; max-width: 100%; }
.cert-mark-text { flex-direction: column; gap: 8px; }
.cert-mark-wordmark {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 700; letter-spacing: 0.12em;
  color: #003B73;
}
.cert-mark-levels { display: flex; gap: 6px; }
.cert-mark-levels span {
  font-size: 11px; font-weight: 600; color: #003B73;
  background: rgba(0,59,115,0.08);
  border: 1px solid rgba(0,59,115,0.18);
  border-radius: 4px; padding: 2px 8px; letter-spacing: 0.04em;
}
.cert-divider { height: 1px; background: var(--border); margin-bottom: 14px; }
.cert-name {
  font-size: 13.5px; font-weight: 600; color: var(--fg);
  font-family: var(--font-display); margin-bottom: 3px;
}
.cert-issuer { font-size: 11px; color: var(--fg-3); margin-bottom: 8px; }
.cert-scope { font-size: 12px; color: var(--fg-2); line-height: 1.5; margin-bottom: 10px; }
.cert-detail {
  font-size: 10.5px; color: var(--fg-3);
  font-family: 'SF Mono','Fira Code',monospace;
  margin-top: auto;
}
.cert-action {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500; color: var(--accent);
  text-decoration: none; margin-top: 10px;
  transition: gap 0.15s;
}
.cert-action:hover { gap: 7px; }
.cert-action svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* ── TISAX VERIFICATION CARD ──────────────────────────────── */
.tisax-card {
  border: 1px solid var(--border);
  border-left: 3px solid #005B9A;
  border-radius: 10px;
  background: var(--bg-card);
  padding: 20px 24px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
}
.tisax-card-left { display: flex; flex-direction: column; gap: 10px; }
.tisax-card-top { display: flex; align-items: center; gap: 12px; }
.tisax-card-name {
  font-size: 13px; font-weight: 600; color: var(--fg);
  font-family: var(--font-display);
}
.tisax-card-full {
  font-size: 11.5px; color: var(--fg-3);
}
.tisax-levels { display: flex; gap: 6px; }
.tisax-level {
  font-size: 11px; font-weight: 700; color: #005B9A;
  background: rgba(0,91,154,0.08);
  border: 1px solid rgba(0,91,154,0.2);
  border-radius: 4px;
  padding: 2px 8px;
  letter-spacing: 0.04em;
}
.tisax-card-meta { display: flex; gap: 28px; }
.tisax-meta-item { display: flex; flex-direction: column; gap: 2px; }
.tisax-meta-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; }
.tisax-meta-value { font-size: 12px; font-weight: 500; color: var(--fg); font-family: 'SF Mono', 'Fira Code', monospace; }
.tisax-card-right { flex-shrink: 0; }
.tisax-portal-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: #005B9A;
  text-decoration: none; border: 1px solid rgba(0,91,154,0.3);
  border-radius: 100px; padding: 7px 14px;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tisax-portal-btn:hover { background: rgba(0,91,154,0.06); border-color: #005B9A; }
.tisax-portal-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.tisax-card-note { font-size: 11px; color: var(--fg-3); margin-top: 4px; }

/* ── FEATURE LIST ─────────────────────────────────────────── */
.tiles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}
.tile {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 24px 32px 24px 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.tile:nth-child(even) {
  padding-left: 32px;
  padding-right: 0;
  border-left: 1px solid var(--border);
}
.tile:hover { background: rgba(0,0,0,0.018); }
.tile-icon {
  flex-shrink: 0; margin-top: 2px;
  width: 32px; height: 32px; border-radius: 8px; background: var(--accent-dim);
  display: flex; align-items: center; justify-content: center;
}
.tile-icon svg { width: 15px; height: 15px; stroke: var(--accent); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
.tile-body {}
.tile h3 { font-size: 13.5px; font-weight: 500; color: var(--fg); margin-bottom: 5px; line-height: 1.35; }
.tile p { font-size: 12.5px; color: var(--fg-2); line-height: 1.68; }

/* ── VULN + CONTACT ───────────────────────────────────────── */
.vuln-contact-wrap {
  max-width: 1120px; margin: 0 auto; padding: 0 40px;
}
.vuln-section { padding: 40px 0 48px; scroll-margin-top: 96px; }
.vuln-section h2 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 14px; }
.vuln-section p { font-size: 13.5px; color: var(--fg-2); line-height: 1.75; max-width: 600px; margin-bottom: 10px; }
.link-accent { color: var(--accent); font-weight: 500; text-decoration: none; }
.link-accent:hover { text-decoration: underline; text-underline-offset: 3px; }
.contact-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px 32px; display: flex; align-items: center;
  justify-content: space-between; gap: 24px; margin-bottom: 48px;
}
.contact-card-text h3 { font-size: 16px; font-weight: 500; margin-bottom: 5px; }
.contact-card-text p { font-size: 13.5px; color: var(--fg-2); line-height: 1.6; max-width: 460px; }
.contact-btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 14px; font-weight: 400; color: #fff; background: var(--color-off-black);
  padding: 10px 20px; border-radius: 100px; text-decoration: none;
  white-space: nowrap; flex-shrink: 0; transition: background 0.15s;
  font-family: var(--font-display);
}
.contact-btn:hover { background: var(--color-applied-blue); }
.contact-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── FOOTER ───────────────────────────────────────────────── */
.footer {
  border-top: 1px solid var(--border); padding: 22px 40px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-copy, .footer-tagline { font-size: 12px; color: var(--fg-3); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 12px; color: var(--fg-3); text-decoration: none; transition: color 0.15s; }
.footer-links a:hover { color: var(--fg); }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 800px) {
  .page-body { grid-template-columns: 1fr; }
  .toc-sidebar { display: none; }
}
@media (max-width: 600px) {
  .tiles-grid { grid-template-columns: 1fr; }
  .tile:nth-child(even) { padding-left: 0; border-left: none; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav class="nav" id="nav"></nav>

<main>
  <!-- HERO: full-width -->
  <div class="page-hero">
    <section class="hero" id="hero"></section>
  </div>
  <div class="divider"></div>

  <!-- BODY: TOC sidebar + sections -->
  <div class="page-body">
    <aside class="toc-sidebar" id="toc"></aside>
    <div class="sections-container" id="sections-container"></div>
  </div>
</main>

<!-- Vuln disclosure + contact + footer: full-width within max-width -->
<div class="divider"></div>
<div class="vuln-contact-wrap">
  <section class="vuln-section" id="vuln"></section>
  <div id="contact"></div>
</div>
<footer class="footer" id="footer"></footer>

<script>
/* ── Escape helper ──────────────────────────────────────────── */
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── NAV ────────────────────────────────────────────────────── */
document.getElementById('nav').innerHTML = `
  <a href="/" class="nav-logo">
    <div class="nav-logo-mark">AI</div>
    ${esc(CONFIG.nav.logo)}
  </a>
  <ul class="nav-links">
    ${CONFIG.nav.links.map(l => `<li><a href="#">${esc(l)}</a></li>`).join('')}
  </ul>
  <div class="nav-end">
    <a href="${CONFIG.nav.cta.href}" class="nav-btn-primary">${esc(CONFIG.nav.cta.label)}</a>
  </div>
`;

/* ── HERO ───────────────────────────────────────────────────── */
document.getElementById('hero').innerHTML = `
  <div class="hero-eyebrow"><span class="hero-eyebrow-bar"></span>${esc(CONFIG.hero.eyebrow)}</div>
  <h1>${esc(CONFIG.hero.heading)}</h1>
  <p>${esc(CONFIG.hero.body)}</p>
  <div class="hero-meta">Last updated ${esc(CONFIG.hero.lastUpdated)}</div>
`;

/* ── TOC ────────────────────────────────────────────────────── */
document.getElementById('toc').innerHTML = `
  <div class="toc-label">On this page</div>
  <ul class="toc-list">
    ${CONFIG.toc.map((item, i) => `
      <li class="toc-item" id="toc-item-${item.id}">
        <a class="toc-link" href="#${item.id}" data-target="${item.id}">
          <span class="toc-link-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="toc-link-label">${esc(item.label)}</span>
          <span class="toc-link-sub">${esc(item.sub)}</span>
        </a>
      </li>
    `).join('')}
  </ul>
`;

/* ── SECTIONS ───────────────────────────────────────────────── */
function renderBadge(b) {
  return `
    <div class="badge-item">
      <div class="badge-frame">
        ${b.img
          ? `<img src="${b.img}" alt="${esc(b.label)}">`
          : `<svg viewBox="0 0 104 104" xmlns="http://www.w3.org/2000/svg">${b.svg}</svg>`
        }
      </div>
      <div class="badge-label">${esc(b.label)}</div>
      <div class="badge-sub">${esc(b.sub)}</div>
    </div>
  `;
}

function renderTile(t) {
  return `
    <div class="tile">
      <div class="tile-icon"><svg viewBox="0 0 24 24">${t.icon}</svg></div>
      <div class="tile-body">
        <h3>${esc(t.title)}</h3>
        <p>${esc(t.body)}</p>
      </div>
    </div>
  `;
}

const TISAX_SVG = `
  <svg viewBox="0 0 140 80" xmlns="http://www.w3.org/2000/svg">
    <rect width="140" height="80" rx="7" fill="#003B73"/>
    <rect x="0.75" y="0.75" width="138.5" height="78.5" rx="6.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <text x="70" y="30" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="21" fill="white" text-anchor="middle" font-weight="800" letter-spacing="4">TISAX</text>
    <line x1="18" y1="38" x2="122" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
    <rect x="21" y="44" width="44" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="43" y="58" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">AL2</text>
    <rect x="75" y="44" width="44" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="97" y="58" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">AL3</text>
    <text x="70" y="74" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">ENX ASSOCIATION</text>
  </svg>
`;

function renderCertCard(c) {
  const mark = c.tisaxText
    ? `<div class="cert-mark cert-mark-text">
        <span class="cert-mark-wordmark">TISAX</span>
        <span class="cert-mark-levels"><span>AL2</span><span>AL3</span></span>
      </div>`
    : `<div class="cert-mark"><img src="${c.img}" alt="${esc(c.name)}"></div>`;
  const action = c.action
    ? `<a href="${c.action.href}" target="_blank" rel="noopener" class="cert-action">
        ${esc(c.action.label)}
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>`
    : '';
  return `
    <div class="cert-card">
      ${mark}
      <div class="cert-divider"></div>
      <div class="cert-name">${esc(c.name)}</div>
      <div class="cert-issuer">${esc(c.issuer)}</div>
      <div class="cert-scope">${esc(c.scope)}</div>
      <div class="cert-detail">${esc(c.detail)}</div>
      ${action}
    </div>
  `;
}

document.getElementById('sections-container').innerHTML = CONFIG.sections.map((s, i) => {
  return `
    <section class="content-section" id="${s.id}">
      <div class="section-header">
        <span class="section-num">${String(i + 1).padStart(2, '0')}</span>
        <h2 class="section-title">${esc(s.label)}</h2>
        <p class="section-tagline">${esc(s.tagline)}</p>
        <p class="section-body">${esc(s.body)}</p>
      </div>
      ${s.certs ? `<div class="cert-grid">${s.certs.map(renderCertCard).join('')}</div>` : ''}
      ${s.tiles && s.tiles.length ? `<div class="tiles-grid">${s.tiles.map(renderTile).join('')}</div>` : ''}
    </section>
  `;
}).join('');

/* ── VULN DISCLOSURE ────────────────────────────────────────── */
const { vulnDisclosure: V, contact: K } = CONFIG;
document.getElementById('vuln').innerHTML = `
  <h2>${esc(V.heading)}</h2>
  ${V.paragraphs.map(p => `<p>${p}</p>`).join('')}
`;

document.getElementById('contact').innerHTML = `
  <div class="contact-card">
    <div class="contact-card-text">
      <h3>${esc(K.heading)}</h3>
      <p>${esc(K.body)}</p>
    </div>
    <a href="mailto:${esc(K.email)}" class="contact-btn">
      ${esc(K.email)}
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>
`;

/* ── FOOTER ─────────────────────────────────────────────────── */
document.getElementById('footer').innerHTML = `
  <div class="footer-copy">${esc(CONFIG.footer.copy)}</div>
  <div class="footer-links">
    ${CONFIG.footer.links.map(l => `<a href="${l.href}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join('')}
  </div>
  <div class="footer-tagline">${esc(CONFIG.footer.tagline)}</div>
`;

/* ── TOC ACTIVE STATE (IntersectionObserver) ────────────────── */
const tocItems = document.querySelectorAll('.toc-item');
const sections = [
  ...document.querySelectorAll('.content-section'),
  document.getElementById('vuln'),
].filter(Boolean);

const observerOptions = {
  root: null,
  rootMargin: '-96px 0px -55% 0px',
  threshold: 0,
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      tocItems.forEach(item => item.classList.remove('active'));
      const activeItem = document.getElementById('toc-item-' + id);
      if (activeItem) activeItem.classList.add('active');
    }
  });
}, observerOptions);

sections.forEach(s => observer.observe(s));

/* ── SMOOTH SCROLL for TOC links ────────────────────────────── */
document.querySelectorAll('.toc-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    const targetId = link.getAttribute('data-target');
    const target = document.getElementById(targetId);
    if (target) {
      const top = target.getBoundingClientRect().top + window.scrollY - 96;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  });
});
</script>
</body>
</html>
